apiVersion: apps/v1
kind: Deployment
metadata:
  name: online-bookstore
spec:
  replicas: 2
  selector:
    matchLabels:
      app: online-bookstore
  template:
    metadata:
      labels:
        app: online-bookstore
    spec:
      containers:
      - name: online-bookstore
        image: lavanyavijay12/online-bookstore:latest
        ports:
        - containerPort: 8080
